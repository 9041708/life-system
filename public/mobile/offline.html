<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#113a2f">
  <title>离线提示</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f2eadc 0%, #f8f5ef 100%);
      color: #1f2933;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .offline-card {
      max-width: 420px;
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 42px rgba(37, 43, 34, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #113a2f;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.7;
      color: #5f6b76;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: #1f7a53;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>当前离线</h1>
    <p>手机端页面资源已缓存，但账本数据需要联网同步。请检查网络后重新打开。</p>
    <a href="/public/mobile/#/home">重新进入</a>
  </div>
</body>
</html>
